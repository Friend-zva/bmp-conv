name: Main Actions

on:
  workflow_dispatch:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]

jobs:
#  linter:
#    runs-on: ubuntu-latest
#
#    steps:
#      - uses: actions/checkout@v3
#
#      - name: Static analyze
#        run: ?

  run:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install requirements
        run: |
            sudo apt update
            sudo apt-get install -y libcmocka-dev

      - name: Build source code
        run: ./scripts/build.sh

      - name: Test source code
        run: ./scripts/test.sh
        continue-on-error: true
