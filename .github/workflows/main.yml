name: Main Actions

on:
  workflow_dispatch:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]

jobs:
  formatter:
    name: Formatter
    runs-on: ubuntu-latest

    steps:
      - name: Clone project
        uses: actions/checkout@v4

      - name: Install requirements
        run: |
          sudo apt update

      - name: Run clang-format
        run: ./scripts/formatter.sh

  linter:
    name: Linter
    runs-on: ubuntu-latest

    steps:
      - name: Clone project
        uses: actions/checkout@v4

      - name: Install requirements
        run: |
          sudo apt update
          sudo apt-get install -y libcmocka-dev

      - name: Build
        run: ./scripts/build.sh

      - name: Run clang-tidy
        run: ./scripts/linter.sh

  run:
    name: Test
    needs: linter
    runs-on: ubuntu-latest

    steps:
      - name: Clone project
        uses: actions/checkout@v4

      - name: Install requirements
        run: |
            sudo apt update
            sudo apt-get install -y libcmocka-dev
            sudo apt install valgrind

      - name: Build
        run: ./scripts/build.sh

      - name: Test
        run: ./scripts/test.sh

      - name: Valgrind
        run: valgrind --leak-check=full --show-leak-kinds=all ./build/src/main bmps/source/nature.bmp bmps/result/nature.bmp id 1 0 par row 8
        continue-on-error: true
